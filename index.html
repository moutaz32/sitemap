<?xml version="1.0" encoding="utf-8"?>
<androidx.constraintlayout.widget.ConstraintLayout 
    xmlns:android="http://schemas.android.com/apk/res/android"
    xmlns:app="http://schemas.android.com/apk/res-auto"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:background="#0A0F1C"
    android:layoutDirection="rtl">

    <TextView
        android:id="@+id/tvGreeting"
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:text="مساء الطمأنينة يا معتز 🌌"
        android:textColor="#D4AF37"
        android:textSize="26sp"
        android:textStyle="bold"
        app:layout_constraintTop_toTopOf="parent"
        app:layout_constraintStart_toStartOf="parent"
        app:layout_constraintEnd_toEndOf="parent"
        android:layout_marginTop="50dp" />

    <TextView
        android:id="@+id/tvSubtitle"
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:text="صدقة جارية عن الحاج محمد المملوك"
        android:textColor="#80FFFFFF"
        android:textSize="14sp"
        app:layout_constraintTop_toBottomOf="@id/tvGreeting"
        app:layout_constraintStart_toStartOf="parent"
        app:layout_constraintEnd_toEndOf="parent"
        android:layout_marginTop="5dp" />

    <androidx.cardview.widget.CardView
        android:id="@+id/cardDaily"
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:layout_marginHorizontal="25dp"
        android:layout_marginTop="30dp"
        app:cardBackgroundColor="#1AFFFFFF" 
        app:cardCornerRadius="30dp"
        app:cardElevation="0dp"
        app:strokeColor="#4DFFFFFF"
        app:strokeWidth="1dp"
        app:layout_constraintTop_toBottomOf="@id/tvSubtitle">

        <LinearLayout
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:orientation="vertical"
            android:gravity="center"
            android:padding="25dp">

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="آية اليوم 📖"
                android:textColor="#D4AF37"
                android:textSize="16sp"
                android:textStyle="bold"
                android:layout_marginBottom="15dp" />

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="﴿ وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ ۚ وَمَن يَتَوَكَّلْ عَلَى اللَّهِ فَهُوَ حَسْبُهُ ﴾"
                android:textColor="#FFFFFF"
                android:textSize="20sp"
                android:gravity="center"
                android:lineSpacingExtra="8dp" />
        </LinearLayout>
    </androidx.cardview.widget.CardView>

    <GridLayout
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:columnCount="2"
        android:rowCount="2"
        android:layout_marginHorizontal="15dp"
        android:layout_marginTop="30dp"
        app:layout_constraintTop_toBottomOf="@id/cardDaily">

        <androidx.cardview.widget.CardView
            android:layout_width="0dp"
            android:layout_height="120dp"
            android:layout_columnWeight="1"
            android:layout_margin="10dp"
            app:cardBackgroundColor="#131A2A"
            app:cardCornerRadius="25dp"
            app:cardElevation="5dp">
            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="match_parent"
                android:orientation="vertical"
                android:gravity="center">
                <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🌅" android:textSize="32sp" />
                <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="أذكار الصباح" android:textColor="#FFFFFF" android:textSize="16sp" android:layout_marginTop="8dp" android:textStyle="bold"/>
            </LinearLayout>
        </androidx.cardview.widget.CardView>

        <androidx.cardview.widget.CardView
            android:layout_width="0dp"
            android:layout_height="120dp"
            android:layout_columnWeight="1"
            android:layout_margin="10dp"
            app:cardBackgroundColor="#131A2A"
            app:cardCornerRadius="25dp"
            app:cardElevation="5dp">
            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="match_parent"
                android:orientation="vertical"
                android:gravity="center">
                <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🌌" android:textSize="32sp" />
                <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="أذكار المساء" android:textColor="#FFFFFF" android:textSize="16sp" android:layout_marginTop="8dp" android:textStyle="bold"/>
            </LinearLayout>
        </androidx.cardview.widget.CardView>

        <androidx.cardview.widget.CardView
            android:layout_width="0dp"
            android:layout_height="120dp"
            android:layout_columnWeight="1"
            android:layout_margin="10dp"
            app:cardBackgroundColor="#131A2A"
            app:cardCornerRadius="25dp"
            app:cardElevation="5dp">
            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="match_parent"
                android:orientation="vertical"
                android:gravity="center">
                <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🕌" android:textSize="32sp" />
                <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="حصن المسلم" android:textColor="#FFFFFF" android:textSize="16sp" android:layout_marginTop="8dp" android:textStyle="bold"/>
            </LinearLayout>
        </androidx.cardview.widget.CardView>

        <androidx.cardview.widget.CardView
            android:id="@+id/btnSettings"
            android:layout_width="0dp"
            android:layout_height="120dp"
            android:layout_columnWeight="1"
            android:layout_margin="10dp"
            app:cardBackgroundColor="#131A2A"
            app:cardCornerRadius="25dp"
            app:cardElevation="5dp"
            app:strokeColor="#D4AF37"
            app:strokeWidth="1dp">
            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="match_parent"
                android:orientation="vertical"
                android:gravity="center">
                <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="⚙️" android:textSize="32sp" />
                <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="الرسائل والإشعارات" android:textColor="#D4AF37" android:textSize="14sp" android:layout_marginTop="8dp" android:textStyle="bold"/>
            </LinearLayout>
        </androidx.cardview.widget.CardView>

    </GridLayout>

</androidx.constraintlayout.widget.ConstraintLayout>
