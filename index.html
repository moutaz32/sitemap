<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TREE WhatsApp Master V2</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            border-top: 6px solid #1b5e20;
        }
        h2 {
            text-align: center;
            color: #1b5e20;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #2c3e50;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus, select:focus {
            border-color: #1b5e20;
            outline: none;
            box-shadow: 0 0 5px rgba(27, 94, 32, 0.2);
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }
        button.generate-btn {
            width: 100%;
            padding: 14px;
            background-color: #1b5e20;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }
        button.generate-btn:hover {
            background-color: #123e15;
        }
        .result-box {
            margin-top: 25px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }
        textarea {
            width: 100%;
            height: 280px;
            padding: 15px;
            border: 2px solid #1b5e20;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            background-color: #fcfdfc;
        }
        button.copy-btn {
            width: 100%;
            padding: 12px;
            background-color: #0277bd;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🌳 ماكينة رسائل TREE (الإصدار الجديد)</h2>
        <p class="subtitle">نظام التأكيد المشروط والاستبدال الشامل</p>
        
        <div class="row">
            <div class="form-group">
                <label for="customerName">اسم العميل</label>
                <input type="text" id="customerName" placeholder="مثال: أ/ محمد">
            </div>
            <div class="form-group">
                <label for="orderNumber">رقم الأوردر</label>
                <input type="text" id="orderNumber" placeholder="رقم الطلب من الموقع">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label for="totalAmount">المبلغ المطلوب (ج.م)</label>
                <input type="number" id="totalAmount" placeholder="الإجمالي شامل الشحن">
            </div>
            <div class="form-group">
                <label for="scenario">نوع الموقف</label>
                <select id="scenario">
                    <option value="conf1">تأكيد 1 (طلب التأكيد الأول)</option>
                    <option value="conf2">تأكيد 2 (شرط الموافقة وعدم المعاينة)</option>
                    <option value="exchange">استبدال (فرع + موقع جديد)</option>
                    <option value="reminder">تذكير (العميل لا يرد)</option>
                </select>
            </div>
        </div>

        <button class="generate-btn" onclick="generateMessage()">⚙️ إنشاء الرسالة فوراً</button>

        <div class="result-box" id="resultBox">
            <label>الرسالة جاهزة للنسخ:</label>
            <textarea id="outputText" readonly></textarea>
            <button class="copy-btn" id="copyBtn" onclick="copyText()">📋 نسخ للواتساب</button>
        </div>
    </div>

    <script>
        function generateMessage() {
            let nameIn = document.getElementById("customerName").value.trim();
            let name = nameIn !== "" ? nameIn : "يا فندم";
            let order = document.getElementById("orderNumber").value.trim();
            let amount = document.getElementById("totalAmount").value.trim();
            let scenario = document.getElementById("scenario").value;
            
            let orderHash = order !== "" ? ` رقم #${order}` : "";
            let amountVal = amount !== "" ? amount : "[المبلغ]";
            
            let result = "";

            if (scenario === "conf1") {
                result = `أهلاً بك ${name} في TREE! 🌳\nسعداء باختيارك لينا.. طلبك${orderHash} وصلنا وبنراجعه حالياً عشان نبدأ التجهيز.\n\nعشان نأكد الأوردر وتخرج الشحنة لشركة الشحن في أسرع وقت، برجاء الرد بكلمة "تأكيد".\n\n(ولو حابب تعدل المقاس أو تضيف أي حاجة للأوردر إحنا موجودين للمساعدة).`;
            } 
            else if (scenario === "conf2") {
                result = `تم التأكيد بنجاح ${name}! 🥳 طلبك${orderHash} دلوقتي قيد التجهيز.\n\n🚚 موعد التسليم: الشحنة هتوصلك خلال (2 إلى 4 أيام عمل)، ومندوب الشحن هيتواصل معك قبل التسليم.\n\n📌 تنبيه هام للاستلام:\nلضمان وصول المنتج بحالته الأصلية وبأعلى جودة، (غير متاح فتح الشحنة أو المعاينة مع المندوب وقت الاستلام) طبقاً لسياسة الشحن.\n\n💡 بس حقك محفوظ 100%:\nلو في أي مشكلة، الاستبدال والاسترجاع متاح بكل سهولة خلال 14 يوم من الفروع مجاناً أو بطلب مندوب آخر.\n\n💰 الإجمالي عند الاستلام: ${amountVal} جنيه.\n\n⚠️ عشان نخرج الشحنة للمندوب، استأذنك تأكدلي بكلمة "موافق" على سياسة الاستلام.`;
            } 
            else if (scenario === "exchange") {
                result = `أهلاً بك ${name} في TREE! 🌳\nولا يهمك خالص، حقك محفوظ 100% في الاستبدال أو الاسترجاع خلال 14 يوم من الاستلام.\n\n🔄 متاح لحضرتك الاستبدال بطريقتين:\n\n1️⃣ عن طريق الفروع (مجاناً):\nتشرفنا في أقرب فرع ليك من فروعنا الـ 34 وتبدل أو ترجع القطعة مجاناً بدون أي مصاريف إضافية.\n\n2️⃣ عن طريق الموقع (شحن للمنزل):\nلو حابب المندوب يجيلك لحد البيت، الخطوات بسيطة:\n- ادخل على الموقع واعمل (أوردر جديد) بالمقاس المطلوب.\n- ابعتلنا هنا في رسالة (رقم الأوردر الجديد).\n\nالمندوب هيجيلك يسلمك الجديد ويستلم القديم في نفس الوقت (يتم إضافة مصاريف شحن للاستبدال).\n\nتحب حضرتك تشرفنا في الفرع ولا نبعتلك المندوب؟ ✨`;
            }
            else if (scenario === "reminder") {
                result = `مساء الخير ${name}،\nحاولنا نتواصل مع حضرتك لتأكيد طلبك من TREE ومفيش رد.\n\nالأوردر جاهز ومستنيين تأكيدك عشان نخرجه لشركة الشحن في أقرب وقت.\nنأكد لحضرتك الشحن ولا نلغي الطلب مؤقتاً؟`;
            }

            document.getElementById("outputText").value = result;
            document.getElementById("resultBox").style.display = "block";
            
            // Reset button
            let btn = document.getElementById("copyBtn");
            btn.innerHTML = "📋 نسخ للواتساب";
            btn.style.backgroundColor = "#0277bd";
        }

        function copyText() {
            let text = document.getElementById("outputText");
            text.select();
            text.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(text.value);
            
            let btn = document.getElementById("copyBtn");
            btn.innerHTML = "✅ تم النسخ بنجاح!";
            btn.style.backgroundColor = "#2e7d32";
            
            setTimeout(() => {
                btn.innerHTML = "📋 نسخ للواتساب";
                btn.style.backgroundColor = "#0277bd";
            }, 2000);
        }
    </script>
</body>
</html>
