<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماكينة TREE لكتابة المحتوى V2</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            width: 100%;
            max-width: 650px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 5px solid #2e7d32;
        }
        h2 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #1b5e20;
        }
        .result-box {
            margin-top: 25px;
            display: none;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 10px;
            border: 1px solid #2e7d32;
            border-radius: 6px;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
        }
        .copy-btn {
            background-color: #0277bd;
            margin-top: 10px;
        }
        .copy-btn:hover {
            background-color: #01579b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🌳 مولد محتوى منتجات TREE (مُحدث)</h2>
        
        <div class="form-grid">
            <div class="form-group">
                <label>نوع المنتج</label>
                <input type="text" id="productType" placeholder="تيشيرت بولو، بنطلون...">
            </div>
            <div class="form-group">
                <label>الخامة (Fabric)</label>
                <input type="text" id="material" placeholder="قطن 100%، كتان...">
            </div>
            <div class="form-group">
                <label>اللون (Color)</label>
                <input type="text" id="color" placeholder="أخضر، أسود...">
            </div>
            <div class="form-group">
                <label>المقاسات المتاحة (Sizes)</label>
                <input type="text" id="sizes" placeholder="S, M, L, XL, 2XL, 3XL">
            </div>
            <div class="form-group">
                <label>الفئة / الجنس (Gender)</label>
                <select id="gender">
                    <option value="رجالي">رجالي (Male)</option>
                    <option value="شبابي">شبابي (Youth)</option>
                    <option value="أولادي">أولادي (Boys)</option>
                </select>
            </div>
            <div class="form-group">
                <label>شكل الياقة (Neckline)</label>
                <select id="neckline">
                    <option value="دائرية (Round)">دائرية (Round)</option>
                    <option value="بولو (Polo)">بولو (Polo)</option>
                    <option value="V-Neck">على شكل V</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label>طول الكم (Sleeve Length)</label>
                <select id="sleeve">
                    <option value="قصيرة">أكمام قصيرة (Short)</option>
                    <option value="طويلة">أكمام طويلة (Long)</option>
                    <option value="بدون أكمام">بدون أكمام (Sleeveless)</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label>المنصة المستهدفة</label>
                <select id="platform">
                    <option value="shopify">شوبيفاي (Shopify) - وصف تفصيلي</option>
                    <option value="jumia">جوميا (Jumia) - SEO و ميزات</option>
                    <option value="noon">نون (Noon) - نقاط سريعة</option>
                </select>
            </div>
        </div>

        <button onclick="generateContent()">⚙️ إنشاء المحتوى</button>

        <div class="result-box" id="resultBox">
            <label>المحتوى الجاهز للنسخ:</label>
            <textarea id="outputText" readonly></textarea>
            <button class="copy-btn" onclick="copyText()">📋 نسخ المحتوى</button>
        </div>
    </div>

    <script>
        function generateContent() {
            let type = document.getElementById("productType").value || "[نوع المنتج]";
            let material = document.getElementById("material").value || "[الخامة]";
            let color = document.getElementById("color").value || "[اللون]";
            let sizes = document.getElementById("sizes").value || "[المقاسات]";
            let gender = document.getElementById("gender").value;
            let neckline = document.getElementById("neckline").value;
            let sleeve = document.getElementById("sleeve").value;
            let platform = document.getElementById("platform").value;
            
            let result = "";

            if (platform === "shopify") {
                result = `${type} ${gender} من TREE | أناقة وراحة بلون ${color}\n\nارتقِ بإطلالتك مع ${type} الـ ${gender} المتميز من كوليكشن TREE الأصلي. مصمم خصيصاً ليمنحك الراحة طوال اليوم بفضل خامة الـ ${material} عالية الجودة.\n\n✨ الميزات التفصيلية:\n- خامة ناعمة ومريحة (${material}).\n- تصميم عملي بياقة ${neckline} وأكمام ${sleeve} لضمان حرية الحركة.\n- لون ${color} غني وثابت معالج ضد البهتان.\n- تلبيس مثالي (Regular Fit) يناسب جميع الأجسام.\n- متوفر بالمقاسات التالية: ${sizes}.\n\n📏 تنبيه: برجاء مراجعة جدول المقاسات قبل الطلب لضمان المقاس المثالي.`;
            } 
            else if (platform === "jumia") {
                result = `العنوان: TREE ${type} ${gender} - ياقة ${neckline} - ${material} - ${color}\n\nأبرز الميزات (Highlights):\n- العلامة التجارية: TREE\n- الفئة المستهدفة: ${gender}\n- الخامة: ${material} (أكمام ${sleeve})\n- اللون: ${color}\n- المقاسات المتاحة: ${sizes}\n\nوصف المنتج (Description):\nاحصل على أفضل تجربة تسوق مع ${type} من TREE. منتج مصمم بعناية بياقة ${neckline} وأكمام ${sleeve} ليناسب الاستخدام اليومي. مصنوع من ${material} ومتوفر بلون ${color} الجذاب.`;
            } 
            else if (platform === "noon") {
                result = `العنوان: ${type} ${gender} بأكمام ${sleeve} ولون ${color}\n\nنظرة عامة:\n- مصمم من ${material} ليوفر أقصى درجات الراحة وحرية الحركة.\n- يتميز بياقة ${neckline} وتصميم يناسب أوقات العمل والخروجات اليومية.\n- لون ${color} أنيق يسهل تنسيقه مع مختلف الإطلالات.\n- متوفر بمجموعة مقاسات تناسب الجميع: (${sizes}).\n- منتج أصلي 100% من مصانع TREE.`;
            }

            document.getElementById("outputText").value = result;
            document.getElementById("resultBox").style.display = "block";
        }

        function copyText() {
            let text = document.getElementById("outputText");
            text.select();
            text.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(text.value);
            alert("✅ تم نسخ المحتوى بنجاح! تقدر تعمله لصق في الموقع دلوقتي.");
        }
    </script>
</body>
</html>
