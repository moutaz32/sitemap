<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TREE WhatsApp Assistant</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border-top: 5px solid #27ae60;
        }
        h2 {
            text-align: center;
            color: #27ae60;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus, select:focus {
            border-color: #27ae60;
            outline: none;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .row .form-group {
            flex: 1;
        }
        button.generate-btn {
            width: 100%;
            padding: 14px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }
        button.generate-btn:hover {
            background-color: #219653;
        }
        .result-box {
            margin-top: 25px;
            display: none;
            animation: fadeIn 0.5s;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 2px solid #27ae60;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            background-color: #f9fbf9;
        }
        button.copy-btn {
            width: 100%;
            padding: 12px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }
        button.copy-btn:hover {
            background-color: #2471a3;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🌳 مساعد TREE لخدمة العملاء</h2>
        <p class="subtitle">أداة توليد رسائل الواتساب السريعة</p>
        
        <div class="row">
            <div class="form-group">
                <label for="customerName">اسم العميل (اختياري)</label>
                <input type="text" id="customerName" placeholder="مثال: أحمد...">
            </div>
            <div class="form-group">
                <label for="orderNumber">رقم الأوردر (اختياري)</label>
                <input type="text" id="orderNumber" placeholder="مثال: 1054...">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label for="totalAmount">المبلغ المطلوب (للتأكيد)</label>
                <input type="number" id="totalAmount" placeholder="مثال: 850">
            </div>
            <div class="form-group">
                <label for="scenario">نوع الرسالة</label>
                <select id="scenario">
                    <option value="conf1">تأكيد 1 (طلب التأكيد)</option>
                    <option value="conf2">تأكيد 2 (الشحن وعدم المعاينة)</option>
                    <option value="exchange">استبدال واسترجاع (شامل)</option>
                    <option value="followup">متابعة العميل (لا يرد)</option>
                </select>
            </div>
        </div>

        <button class="generate-btn" onclick="generateMessage()">⚙️ إنشاء الرسالة</button>

        <div class="result-box" id="resultBox">
            <textarea id="outputText" readonly></textarea>
            <button class="copy-btn" id="copyBtn" onclick="copyText()">📋 نسخ الرسالة للواتساب</button>
        </div>
    </div>

    <script>
        function generateMessage() {
            let nameInput = document.getElementById("customerName").value.trim();
            let name = nameInput !== "" ? nameInput : "يا فندم";
            let order = document.getElementById("orderNumber").value.trim();
            let amount = document.getElementById("totalAmount").value.trim();
            let scenario = document.getElementById("scenario").value;
            
            let orderText = order !== "" ? ` رقم #${order}` : "";
            let amountText = amount !== "" ? amount : "[المبلغ]";
            
            let result = "";

            if (scenario === "conf1") {
                result = `أهلاً بك ${name} في TREE! 🌳\nسعداء باختيارك لينا.. طلبك${orderText} وصلنا وبنراجعه حالياً عشان نبدأ التجهيز.\n\nعشان نأكد الأوردر وتخرج الشحنة لشركة الشحن في أسرع وقت، برجاء الرد بكلمة "تأكيد".\n\n(ولو حابب تعدل المقاس أو تضيف أي حاجة للأوردر إحنا موجودين للمساعدة).`;
            } 
            else if (scenario === "conf2") {
                result = `تم التأكيد بنجاح ${name}! 🥳 طلبك${orderText} دلوقتي قيد التجهيز.\n\n🚚 موعد التسليم: الشحنة هتوصلك خلال (2 إلى 4 أيام عمل)، ومندوب الشحن هيتواصل معك قبل التسليم.\n\n📌 تنبيه هام للاستلام:\nلضمان وصول المنتج بحالته الأصلية وبأعلى جودة، (غير متاح فتح الشحنة أو المعاينة مع المندوب وقت الاستلام) طبقاً لسياسة التعاقد مع شركة الشحن.\n\n💡 بس حقك محفوظ 100%:\nلو في أي مشكلة، الاستبدال والاسترجاع متاح بكل سهولة خلال 14 يوم من خلال:\n1️⃣ تشرفنا في أقرب فرع ليك وتبدل أو ترجع مجاناً.\n2️⃣ أو نبعتلك المندوب مرة تانية لحد باب البيت (بإضافة مصاريف شحن جديدة).\n\n💰 الإجمالي المطلوب عند الاستلام: ${amountText} جنيه.\n\nنتمنى لك تجربة تسوق مميزة مع كوليكشن TREE! ✨`;
            } 
            else if (scenario === "exchange") {
                result = `أهلاً بك ${name} في TREE! 🌳\nولا يهمك خالص، حقك محفوظ 100% في الاستبدال أو الاسترجاع خلال 14 يوم من الاستلام.\n\n🔄 متاح لحضرتك الاستبدال بطريقتين:\n\n1️⃣ عن طريق الفروع (مجاناً):\nتشرفنا في أقرب فرع ليك من فروعنا الـ 34 وتبدل أو ترجع القطعة مجاناً بدون أي مصاريف إضافية.\n\n2️⃣ عن طريق الموقع (شحن للمنزل):\nلو حابب المندوب يجيلك لحد البيت، الخطوات بسيطة:\n- ادخل على الموقع واعمل (أوردر جديد) بالمقاس أو المنتج اللي محتاجه.\n- ابعتلنا هنا في رسالة (رقم الأوردر الجديد).\n\nالمندوب هيجيلك يسلمك الجديد ويستلم القديم في نفس الوقت (يتم فقط إضافة مصاريف شحن لعملية الاستبدال).\n\nتحب حضرتك تشرفنا في الفرع ولا نبعتلك المندوب؟ ✨`;
            }
            else if (scenario === "followup") {
                result = `مساء الخير ${name}،\nحاولنا نتواصل مع حضرتك لتأكيد طلبك من TREE ومفيش رد.\n\nالأوردر جاهز ومستنيين تأكيدك عشان نخرجه لشركة الشحن في أقرب وقت.\nنأكد لحضرتك الشحن ولا نلغي الطلب مؤقتاً؟`;
            }

            document.getElementById("outputText").value = result;
            document.getElementById("resultBox").style.display = "block";
            
            // Reset button text
            let btn = document.getElementById("copyBtn");
            btn.innerHTML = "📋 نسخ الرسالة للواتساب";
            btn.style.backgroundColor = "#2980b9";
        }

        function copyText() {
            let text = document.getElementById("outputText");
            text.select();
            text.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(text.value);
            
            let btn = document.getElementById("copyBtn");
            btn.innerHTML = "✅ تم النسخ بنجاح!";
            btn.style.backgroundColor = "#27ae60";
            
            setTimeout(() => {
                btn.innerHTML = "📋 نسخ الرسالة للواتساب";
                btn.style.backgroundColor = "#2980b9";
            }, 2000);
        }
    </script>
</body>
</html>
